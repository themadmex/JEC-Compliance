services:
  db:
    image: postgres:16-alpine
    container_name: jec_postgres
    restart: always
    environment:
      POSTGRES_USER: jec_admin
      POSTGRES_PASSWORD: jec_password_2026
      POSTGRES_DB: jec_soc2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jec_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
